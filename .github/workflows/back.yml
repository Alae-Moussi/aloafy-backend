name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t lailaaaaa/aloafy-backend:latest .

      - name: Push to Docker Hub
        run: docker push lailaaaaa/aloafy-backend:latest

  deploy-to-prod:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Run Ansible Playbook to Deploy Backend on Prod VM
        run: ansible-playbook -i ~/hosts.ini ~/deploy_backend.yml
