name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t lailaaaaa/aloafy-backend:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'lailaaaaa/aloafy-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Push to Docker Hub
        run: docker push lailaaaaa/aloafy-backend:latest

  deploy-to-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulation setup
        run: echo "Fin du pipeline DevSecOps. Scan Trivy disponible dans les logs du build !"

- name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: new-channel
          SLACK_COLOR: ${{ job.status == 'success' ? 'good' : 'danger' }}
          SLACK_ICON: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
          SLACK_TITLE: '🚀 Rapport DevSecOps — Projet Aloafy'
          SLACK_MESSAGE: |
            Le pipeline CI/CD vient de s'exécuter !
            *Statut du build :* ${{ job.status }}
            *Scan de sécurité Trivy :* Terminé avec succès. 
            Consultez les logs GitHub Actions pour voir le rapport détaillé.
      
