apiVersion: apps/v1
kind: Deployment
metadata:
  name: aloafy-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aloafy-backend
  template:
    metadata:
      labels:
        app: aloafy-backend
    spec:
      containers:
      - name: backend
        image: lailaaaaa/aloafy-backend:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: aloafy-backend-service
  namespace: default
spec:
  selector:
    app: aloafy-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
